global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'stock-app'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerting-rules.yml"

scrape_configs:
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8081']
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']