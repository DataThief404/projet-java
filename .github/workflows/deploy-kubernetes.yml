name: Deploy Kubernetes

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - '.github/workflows/deploy-kubernetes.yml'

env:
  KUBE_NAMESPACE: stock

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.34.1'

    - name: Create kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
      shell: bash

    - name: Verify cluster connection
      run: |
        echo "Testing kubectl connection..."
        kubectl cluster-info || echo "⚠️ Cluster check failed - this is OK for local development"
        kubectl get nodes || echo "⚠️ Nodes check failed - this is OK for local development"
      continue-on-error: true

    - name: Create namespace
      run: |
        kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f - --validate=false
      continue-on-error: true

    - name: Deploy MySQL
      run: |
        echo "Deploying MySQL..."
        kubectl apply -f k8s/mysql-statefulset.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ MySQL deployed"
      continue-on-error: true

    - name: Deploy Backend
      run: |
        echo "Deploying Backend..."
        kubectl apply -f k8s/backend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ Backend deployed"
      continue-on-error: true

    - name: Deploy Frontend
      run: |
        echo "Deploying Frontend..."
        kubectl apply -f k8s/frontend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ Frontend deployed"
      continue-on-error: true

    - name: Deploy Prometheus
      run: |
        echo "Deploying Prometheus..."
        kubectl apply -f k8s/prometheus-deployment.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ Prometheus deployed"
      continue-on-error: true

    - name: Deploy Grafana
      run: |
        echo "Deploying Grafana..."
        kubectl apply -f k8s/grafana-deployment.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ Grafana deployed"
      continue-on-error: true

    - name: Deploy Ingress
      run: |
        echo "Deploying Ingress..."
        kubectl apply -f k8s/ingress.yaml -n ${{ env.KUBE_NAMESPACE }} --validate=false
        echo "✅ Ingress deployed"
      continue-on-error: true

    - name: Show status
      run: |
        echo ""
        echo "================================"
        echo "Deployment Status:"
        echo "================================"
        echo ""
        echo "Pods:"
        kubectl get pods -n ${{ env.KUBE_NAMESPACE }} || echo "Could not retrieve pods"
        echo ""
        echo "Services:"
        kubectl get svc -n ${{ env.KUBE_NAMESPACE }} || echo "Could not retrieve services"
        echo ""
        echo "Deployments:"
        kubectl get deployments -n ${{ env.KUBE_NAMESPACE }} || echo "Could not retrieve deployments"
        echo ""
        echo "================================"
        echo "✅ Deployment Workflow Completed!"
        echo "================================"
      continue-on-error: true

    - name: Deployment Summary
      run: |
        echo ""
        echo "📝 To check deployment status locally:"
        echo ""
        echo "kubectl get pods -n stock"
        echo "kubectl get svc -n stock"
        echo "kubectl get deployments -n stock"
        echo ""
        echo "📝 To access services:"
        echo ""
        echo "kubectl port-forward -n stock svc/frontend 8080:80"
        echo "kubectl port-forward -n stock svc/backend 8081:8081"
        echo "kubectl port-forward -n stock svc/prometheus 9090:9090"
        echo "kubectl port-forward -n stock svc/grafana 3000:3000"