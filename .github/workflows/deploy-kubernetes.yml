name: Deploy Kubernetes

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - '.github/workflows/deploy-kubernetes.yml'

env:
  REGISTRY: ghcr.io
  KUBE_NAMESPACE: stock

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.34.1'

    - name: Create kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
      shell: bash

    - name: Verify cluster connection
      run: |
        echo "Testing kubectl connection..."
        kubectl cluster-info
        kubectl get nodes
      continue-on-error: true

    - name: Create namespace
      run: |
        kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy MySQL
      run: |
        echo "Deploying MySQL..."
        kubectl apply -f k8s/mysql-statefulset.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ MySQL deployed"

    - name: Deploy Backend
      run: |
        echo "Deploying Backend..."
        kubectl apply -f k8s/backend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ Backend deployed"

    - name: Deploy Frontend
      run: |
        echo "Deploying Frontend..."
        kubectl apply -f k8s/frontend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ Frontend deployed"

    - name: Deploy Prometheus
      run: |
        echo "Deploying Prometheus..."
        kubectl apply -f k8s/prometheus-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ Prometheus deployed"

    - name: Deploy Grafana
      run: |
        echo "Deploying Grafana..."
        kubectl apply -f k8s/grafana-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ Grafana deployed"

    - name: Deploy Ingress
      run: |
        echo "Deploying Ingress..."
        kubectl apply -f k8s/ingress.yaml -n ${{ env.KUBE_NAMESPACE }}
        echo "✅ Ingress deployed"

    - name: Wait for deployments
      run: |
        echo "Waiting for deployments to be ready..."
        kubectl rollout status deployment/backend -n ${{ env.KUBE_NAMESPACE }} --timeout=5m || true
        kubectl rollout status deployment/frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=5m || true
        kubectl rollout status deployment/prometheus -n ${{ env.KUBE_NAMESPACE }} --timeout=5m || true
        kubectl rollout status deployment/grafana -n ${{ env.KUBE_NAMESPACE }} --timeout=5m || true

    - name: Verify deployment
      run: |
        echo "================================"
        echo "Deployment Status:"
        echo "================================"
        echo ""
        echo "Pods:"
        kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
        echo ""
        echo "Services:"
        kubectl get svc -n ${{ env.KUBE_NAMESPACE }}
        echo ""
        echo "Deployments:"
        kubectl get deployments -n ${{ env.KUBE_NAMESPACE }}
        echo ""
        echo "================================"
        echo "✅ Deployment Complete!"
        echo "================================"

    - name: Show access instructions
      run: |
        echo ""
        echo "📝 Access your services:"
        echo ""
        echo "Frontend:"
        echo "  kubectl port-forward -n stock svc/frontend 8080:80"
        echo "  Then open: http://localhost:8080"
        echo ""
        echo "Backend:"
        echo "  kubectl port-forward -n stock svc/backend 8081:8081"
        echo "  Then open: http://localhost:8081/actuator/health"
        echo ""
        echo "Prometheus:"
        echo "  kubectl port-forward -n stock svc/prometheus 9090:9090"
        echo "  Then open: http://localhost:9090"
        echo ""
        echo "Grafana:"
        echo "  kubectl port-forward -n stock svc/grafana 3000:3000"
        echo "  Then open: http://localhost:3000"
        echo "  Login: admin / admin123"